name: ci

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  go:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      # go.sum закоммичен — строгая проверка: tidy не должен ничего менять.
      # Обновление зависимостей: правьте go.mod и запускайте workflow update-gosum.
      - name: Tidy check
        run: |
          go mod tidy
          git diff --exit-code go.mod go.sum

      - name: Vet
        run: go vet ./...

      - name: Build
        run: go build ./...

      - name: Test
        run: go test ./... -count=1

  envtest:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: "1.22"
          cache: true

      - name: Download dependencies
        run: go mod download

      - name: Install setup-envtest
        # release-0.19 использует новый индекс бинарников на GitHub
        # (старый GCS-бакет kubebuilder-tools отдаёт 401), при этом собирается на Go 1.22.
        run: go install sigs.k8s.io/controller-runtime/tools/setup-envtest@release-0.19

      - name: Run integration tests (envtest)
        run: |
          export PATH="$PATH:$(go env GOPATH)/bin"
          export KUBEBUILDER_ASSETS="$(setup-envtest use 1.29.0 -p path)"
          test -n "$KUBEBUILDER_ASSETS" || { echo "envtest assets not resolved"; exit 1; }
          echo "KUBEBUILDER_ASSETS=$KUBEBUILDER_ASSETS"
          go test -tags=integration ./... -count=1 -run Integration -v
