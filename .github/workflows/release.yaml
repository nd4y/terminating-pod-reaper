name: build-and-release

# Собирает и публикует Docker-образ оператора в GHCR,
# а также линтит/пакует/публикует Helm chart как OCI-артефакт.
#
# Триггеры:
#   - push в main            → образ с тегами :main, :sha-<...>
#   - push тега v*           → образ :<version>, :latest + публикация чарта
#   - pull_request           → только сборка/линт без публикации
#
# ВАЖНО: если репозиторий с оператором лежит в подкаталоге (operator/),
# перенесите этот файл в .github/workflows/ КОРНЯ репозитория
# и поправьте defaults.run.working-directory / context ниже.

on:
  push:
    branches: [main]
    tags: ["v*"]
  pull_request:
    branches: [main]

env:
  REGISTRY: ghcr.io
  IMAGE_NAME: ${{ github.repository }}

permissions:
  contents: read
  packages: write

jobs:
  image:
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.meta.outputs.version }}
    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to GHCR
        if: github.event_name != 'pull_request'
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Docker metadata
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.IMAGE_NAME }}
          tags: |
            type=ref,event=branch
            type=ref,event=pr
            type=semver,pattern={{version}}
            type=semver,pattern={{major}}.{{minor}}
            type=sha
            type=raw,value=latest,enable=${{ startsWith(github.ref, 'refs/tags/v') }}

      - name: Build & push image
        uses: docker/build-push-action@v6
        with:
          # Контекст = каталог оператора (Dockerfile здесь же).
          # Если workflow в корне монорепо, укажите context: operator
          context: .
          push: ${{ github.event_name != 'pull_request' }}
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          platforms: linux/amd64,linux/arm64
          cache-from: type=gha
          cache-to: type=gha,mode=max

  chart:
    runs-on: ubuntu-latest
    needs: image
    steps:
      - uses: actions/checkout@v4

      - name: Set up Helm
        uses: azure/setup-helm@v4
        with:
          version: v3.15.2

      - name: Lint chart
        run: helm lint charts/terminating-pod-reaper

      - name: Template chart (проверка рендера)
        run: helm template test charts/terminating-pod-reaper --namespace terminating-pod-reaper > /dev/null

      # Публикация чарта только на тег v*
      - name: Log in to GHCR (OCI)
        if: startsWith(github.ref, 'refs/tags/v')
        run: echo "${{ secrets.GITHUB_TOKEN }}" | helm registry login ${{ env.REGISTRY }} -u ${{ github.actor }} --password-stdin

      - name: Package & push chart
        if: startsWith(github.ref, 'refs/tags/v')
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          helm package charts/terminating-pod-reaper --version "$VERSION" --app-version "$VERSION"
          helm push "terminating-pod-reaper-${VERSION}.tgz" "oci://${REGISTRY}/${{ github.repository_owner }}/charts"
