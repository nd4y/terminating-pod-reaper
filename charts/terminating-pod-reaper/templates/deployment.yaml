apiVersion: apps/v1
kind: Deployment
metadata:
  name: {{ include "reaper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "reaper.labels" . | nindent 4 }}
spec:
  replicas: {{ .Values.replicaCount }}
  selector:
    matchLabels:
      {{- include "reaper.selectorLabels" . | nindent 6 }}
  template:
    metadata:
      labels:
        {{- include "reaper.selectorLabels" . | nindent 8 }}
        {{- with .Values.podLabels }}
        {{- toYaml . | nindent 8 }}
        {{- end }}
      {{- with .Values.podAnnotations }}
      annotations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
    spec:
      serviceAccountName: {{ include "reaper.serviceAccountName" . }}
      {{- with .Values.imagePullSecrets }}
      imagePullSecrets:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      securityContext:
        {{- toYaml .Values.podSecurityContext | nindent 8 }}
      containers:
        - name: reaper
          image: "{{ .Values.image.repository }}:{{ include "reaper.imageTag" . }}"
          imagePullPolicy: {{ .Values.image.pullPolicy }}
          args:
            - --leader-elect={{ include "reaper.leaderElect" . }}
            - --metrics-bind-address=:{{ .Values.metrics.port }}
            - --health-probe-bind-address=:8081
          env:
            - name: DRY_RUN
              value: {{ .Values.config.dryRun | quote }}
            - name: REAP_OWNER_KINDS
              value: {{ join "," .Values.config.ownerKinds | quote }}
            - name: NAMESPACES
              value: {{ join "," .Values.config.watchNamespaces | quote }}
            - name: NAMESPACE_INCLUDE_REGEX
              value: {{ .Values.config.filters.namespaceIncludeRegex | quote }}
            - name: NAMESPACE_EXCLUDE_REGEX
              value: {{ .Values.config.filters.namespaceExcludeRegex | quote }}
            - name: NAMESPACE_INCLUDE_SELECTOR
              value: {{ .Values.config.filters.namespaceIncludeSelector | quote }}
            - name: NAMESPACE_EXCLUDE_SELECTOR
              value: {{ .Values.config.filters.namespaceExcludeSelector | quote }}
            - name: POD_EXCLUDE_SELECTOR
              value: {{ .Values.config.filters.podExcludeSelector | quote }}
          ports:
            - name: metrics
              containerPort: {{ .Values.metrics.port }}
          livenessProbe:
            httpGet:
              path: /healthz
              port: 8081
            initialDelaySeconds: 15
            periodSeconds: 20
          readinessProbe:
            httpGet:
              path: /readyz
              port: 8081
            initialDelaySeconds: 5
            periodSeconds: 10
          securityContext:
            {{- toYaml .Values.securityContext | nindent 12 }}
          resources:
            {{- toYaml .Values.resources | nindent 12 }}
      {{- with .Values.nodeSelector }}
      nodeSelector:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.affinity }}
      affinity:
        {{- toYaml . | nindent 8 }}
      {{- end }}
      {{- with .Values.tolerations }}
      tolerations:
        {{- toYaml . | nindent 8 }}
      {{- end }}
