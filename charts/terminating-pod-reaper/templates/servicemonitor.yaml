{{- if .Values.metrics.serviceMonitor.enabled -}}
apiVersion: monitoring.coreos.com/v1
kind: ServiceMonitor
metadata:
  name: {{ include "terminating-pod-reaper.fullname" . }}
  namespace: {{ .Release.Namespace }}
  labels:
    {{- include "terminating-pod-reaper.labels" . | nindent 4 }}
    {{- with .Values.metrics.serviceMonitor.labels }}
    {{- toYaml . | nindent 4 }}
    {{- end }}
spec:
  selector:
    matchLabels:
      {{- include "terminating-pod-reaper.selectorLabels" . | nindent 6 }}
  endpoints:
    - port: metrics
      interval: {{ .Values.metrics.serviceMonitor.interval }}
      # Метрики оператора несут свой собственный лейбл namespace — namespace
      # обрабатываемого пода, а не namespace самого оператора. Без honorLabels
      # Prometheus/VictoriaMetrics перезаписывает этот лейбл namespace'ом
      # scrape-таргета (т.е. namespace'ом самого оператора), и все breakdown'ы
      # "by namespace" схлопываются в одно значение.
      honorLabels: true
{{- end }}
