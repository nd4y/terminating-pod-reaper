# -- Количество реплик. Для >1 включите leaderElection.enabled.
replicaCount: 1

image:
  repository: ghcr.io/nd4y/terminating-pod-reaper
  # -- Тег образа. Пусто → берётся .Chart.AppVersion.
  tag: ""
  pullPolicy: IfNotPresent

imagePullSecrets: []
nameOverride: ""
fullnameOverride: ""

# --- Поведение оператора ---
# Оператор удаляет под после истечения его terminationGracePeriodSeconds
# (+ extraGraceSeconds буфера). Отдельного настраиваемого «порога ожидания» нет.
config:
  # -- true — только логировать, ничего не удалять. По умолчанию включён
  #    безопасный режим: для реального удаления задайте dryRun: false.
  dryRun: true

  # -- Буфер (сек) сверх terminationGracePeriodSeconds пода перед force-delete.
  #    Пока под жив ещё этот буфер после дедлайна — считаем завершение штатным
  #    (kubelet/sidecar может законно закончить чуть позже номинального grace,
  #    классика — Istio proxy). Без буфера оператор гонится с kubelet и может
  #    удалить объект пода до того, как тот реально освободит ресурсы ноды.
  #    Вмешательство происходит только если под пережил ещё и этот запас.
  extraGraceSeconds: 60

  # -- Максимум подов, удаляемых за один интервал опроса (syncPeriodSeconds).
  #    Защищает API-сервер от лавины удалений при отказе целой зоны.
  #    0 = без ограничения.
  maxDeletionsPerInterval: 50

  # -- Как часто (сек) полностью ресинкать состояние кластера — страховка от
  #    пропущенных watch-событий; это же окно для maxDeletionsPerInterval.
  syncPeriodSeconds: 600

  # -- Удалять только поды под управлением контроллера с одним из Kind.
  #    Для сценария отказа зоны/ноды: ReplicaSet (Deployment) и Job (CronJob)
  #    пересоздадут поды в живой зоне. StatefulSet/DaemonSet/«голые» — не трогаем.
  #    Пустой список = любой владелец (снимает ограничение).
  ownerKinds:
    - ReplicaSet
    - Job
  # -- Жёсткое ограничение watch списком namespace (сужает кэш/нагрузку на API).
  #    Пусто = весь кластер. Пример: ["app-prod", "app-staging"]
  watchNamespaces: []

  # --- Мягкая фильтрация (применяется в reconcile) ---
  filters:
    # -- Обрабатывать только namespace, чьё ИМЯ совпадает с regex. Пусто = не ограничивать.
    namespaceIncludeRegex: ""
    # -- Исключить namespace, чьё ИМЯ совпадает с regex.
    #    По умолчанию защищён kube-system. Чтобы исключить ещё и другие ns, включите
    #    kube-system в свой regex, напр. "^(kube-system|kube-node-lease)$".
    namespaceExcludeRegex: "^kube-system$"
    # -- Обрабатывать только namespace с МЕТКАМИ по label selector (напр. "terminating-pod-reaper=enabled").
    namespaceIncludeSelector: ""
    # -- Исключить namespace с МЕТКАМИ по label selector (напр. "terminating-pod-reaper.io/protected=true").
    namespaceExcludeSelector: ""
    # -- Не трогать поды с МЕТКАМИ по label selector (напр. "terminating-pod-reaper.io/ignore=true").
    podExcludeSelector: ""

rbac:
  # -- Создавать RBAC-ресурсы.
  create: true
  # -- Область прав: "cluster" (ClusterRole) или "namespaced".
  #    "namespaced" валиден только если задан watchNamespaces — Role/RoleBinding
  #    создаются в каждом из этих namespace.
  scope: cluster

serviceAccount:
  create: true
  name: ""
  annotations: {}

# -- Leader election для HA. Включается автоматически при replicaCount > 1;
#    этот флаг позволяет включить его принудительно и при одной реплике.
leaderElection:
  enabled: false

# -- PodDisruptionBudget: создаётся при replicaCount > 1, чтобы drain нод
#    не выносил все реплики оператора одновременно.
podDisruptionBudget:
  enabled: true
  minAvailable: 1

metrics:
  # -- Порт /metrics.
  port: 8080
  service:
    enabled: true
    port: 8080
  serviceMonitor:
    # -- Создать ServiceMonitor (требуется Prometheus Operator / CRD monitoring.coreos.com).
    enabled: false
    interval: 30s
    labels: {}

resources:
  requests:
    cpu: 50m
    memory: 64Mi
  limits:
    cpu: 200m
    memory: 128Mi

podAnnotations: {}
podLabels: {}

nodeSelector: {}
tolerations: []
affinity: {}

podSecurityContext:
  runAsNonRoot: true
  seccompProfile:
    type: RuntimeDefault

securityContext:
  allowPrivilegeEscalation: false
  readOnlyRootFilesystem: true
  runAsNonRoot: true
  capabilities:
    drop:
      - ALL
